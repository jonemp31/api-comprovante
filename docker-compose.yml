version: "3.8"

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 6144M
        reservations:
          memory: 3072M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5

  pix-extractor:
    image: jondevsouza31/api-comprovante:latest
    ports:
      - "8080:8000"
    environment:
      - EXPECTED_NOME_RECEBEDOR=Maria Eduarda Cavaton
      - EXPECTED_CPF_RECEBEDOR_PARTIAL=824.458
      - EXPECTED_INSTITUICAO_RECEBEDOR=Banco Inter
      - EXPECTED_CHAVE_PIX=16991500219
      - MAX_HORAS_VALIDADE=24
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=qwen2.5-vl:3b
      - OLLAMA_ENABLED=true
      - OLLAMA_TIMEOUT=120
      - OLLAMA_MIN_SCORE=0.45
    depends_on:
      - ollama
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 1024M
        reservations:
          cpus: "0.5"
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  ollama_data:
